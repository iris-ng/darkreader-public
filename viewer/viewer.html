<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Dark Reader</title>
  <link rel="stylesheet" href="../pdfjs/web/pdf_viewer.css">
  <style>
    html, body { margin: 0; height: 100%; background: #1e1f22; }
    #toolbar { position: fixed; inset: 0 0 auto 0; height: 40px; display: flex;
      align-items: center; gap: 8px; padding: 0 10px; background: #1e1f22;
      color: #d7d4cc; z-index: 10; border-bottom: 1px solid #ffffff14;
      font: 13px "Segoe UI", system-ui; transition: transform .2s ease; }
    #viewerContainer { position: absolute; inset: 40px 0 0 0; overflow: auto; }
    .pdfViewer .page { margin: 10px auto; box-shadow: 0 6px 22px rgba(0,0,0,.45); border: 0; }
  </style>
</head>
<body>
  <div id="toolbar"></div>
  <div id="viewerContainer"><div id="viewer" class="pdfViewer"></div></div>
  <!-- Dark-mode tone curve. After invert+hue-rotate, background=black(0)/text=white(1);
       this remaps each channel [0,1]->[shade,1], lifting the background to grey while
       keeping text at FULL white (crisper, more faithful than a symmetric contrast()).
       theme-engine.ts mutates the tableValues live from the toolbar slider. -->
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0">
    <filter id="pdr-tone" color-interpolation-filters="sRGB" x="0%" y="0%" width="100%" height="100%">
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0.12 1"></feFuncR>
        <feFuncG type="table" tableValues="0.12 1"></feFuncG>
        <feFuncB type="table" tableValues="0.132 1"></feFuncB>
      </feComponentTransfer>
    </filter>
  </svg>
  <script type="module" src="./boot.js"></script>
</body>
</html>
